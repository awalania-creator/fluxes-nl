<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxes.nl — Under Construction</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#050508;font-family:'Courier New',monospace;color:#3dffc2}
  canvas{position:fixed;top:0;left:0;z-index:0}
  #overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none}
  #main-text{font-size:clamp(1.4rem,5vw,4rem);font-weight:bold;text-align:center;opacity:0;text-shadow:0 0 20px #3dffc2,0 0 60px #3dffc288,0 0 120px #3dffc244;letter-spacing:.15em;line-height:1.4}
  #sub-text{font-size:clamp(.7rem,2vw,1.2rem);opacity:0;margin-top:1.2rem;letter-spacing:.35em;text-transform:uppercase;color:#3dffc2aa}
  #tagline{font-size:clamp(.55rem,1.4vw,.85rem);opacity:0;margin-top:2.5rem;letter-spacing:.2em;color:#3dffc266}
  .glow{animation:pulse 2s ease-in-out infinite alternate}
  @keyframes pulse{0%{text-shadow:0 0 20px #3dffc2,0 0 60px #3dffc288}100%{text-shadow:0 0 40px #3dffc2,0 0 100px #3dffc2aa,0 0 200px #3dffc266}}
  #click-hint{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:2;font-size:.7rem;letter-spacing:.3em;color:#3dffc244;animation:fadeHint 2s ease-in-out infinite alternate;text-transform:uppercase}
  @keyframes fadeHint{0%{opacity:.2}100%{opacity:.7}}
  .explosion-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,#3dffc233 0%,transparent 70%);z-index:3;pointer-events:none;opacity:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="main-text"></div>
  <div id="sub-text">UNDER CONSTRUCTION</div>
  <div id="tagline">Something extraordinary is being built</div>
</div>
<div id="click-hint">[ click anywhere for chaos ]</div>
<div class="explosion-flash" id="flash"></div>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
class Trace{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.segments=[];this.len=Math.floor(Math.random()*25)+10;
    this.speed=Math.random()*3+1.5;this.dir=Math.floor(Math.random()*4);
    this.life=1;this.decay=Math.random()*.008+.003;
    this.thickness=Math.random()*1.5+.5;
    this.built=false;this.buildIndex=0;this.buildTimer=0;
    let x=this.x,y=this.y,d=this.dir;
    for(let i=0;i<this.len;i++){
      const segLen=Math.random()*60+20;
      let nx=x,ny=y;
      if(d===0)nx+=segLen;else if(d===1)ny+=segLen;
      else if(d===2)nx-=segLen;else ny-=segLen;
      this.segments.push({x1:x,y1:y,x2:nx,y2:ny});
      x=nx;y=ny;
      if(Math.random()>.4)d=(d+((Math.random()>.5)?1:3))%4;
    }
  }
  update(){
    this.buildTimer+=this.speed;
    if(this.buildTimer>1&&this.buildIndex<this.segments.length){this.buildIndex++;this.buildTimer=0}
    if(this.buildIndex>=this.segments.length)this.life-=this.decay;
    if(this.life<=0)this.reset();
  }
  draw(){
    ctx.strokeStyle='rgba(61,255,194,'+this.life*.35+')';
    ctx.lineWidth=this.thickness;ctx.beginPath();
    for(let i=0;i<this.buildIndex;i++){const s=this.segments[i];ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2)}
    ctx.stroke();
    if(this.buildIndex>0&&this.buildIndex<=this.segments.length){
      const tip=this.segments[Math.min(this.buildIndex-1,this.segments.length-1)];
      ctx.beginPath();ctx.arc(tip.x2,tip.y2,3,0,Math.PI*2);
      ctx.fillStyle='rgba(61,255,194,'+this.life*.8+')';ctx.fill();
      ctx.beginPath();ctx.arc(tip.x2,tip.y2,8,0,Math.PI*2);
      ctx.fillStyle='rgba(61,255,194,'+this.life*.15+')';ctx.fill();
    }
    for(let i=0;i<this.buildIndex;i++){if(Math.random()>.92){const s=this.segments[i];ctx.beginPath();ctx.arc(s.x1,s.y1,2,0,Math.PI*2);ctx.fillStyle='rgba(61,255,194,'+this.life*.4+')';ctx.fill()}}
  }
}
const traces=[];for(let i=0;i<(window.innerWidth<600?8:18);i++)traces.push(new Trace());
class Particle{
  constructor(x,y,vx,vy,life,size,type){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=this.maxLife=life;this.size=size;this.type=type||'dot'}
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.02;this.vx*=.99;this.vy*=.99;this.life--}
  draw(){
    const a=this.life/this.maxLife;
    if(this.type==='spark'){ctx.strokeStyle='rgba(61,255,194,'+a+')';ctx.lineWidth=this.size;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x-this.vx*4,this.y-this.vy*4);ctx.stroke()}
    else if(this.type==='ring'){const r=(1-a)*80;ctx.strokeStyle='rgba(61,255,194,'+a*.5+')';ctx.lineWidth=2*a;ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.stroke()}
    else{ctx.beginPath();ctx.arc(this.x,this.y,this.size*a,0,Math.PI*2);ctx.fillStyle='rgba(61,255,194,'+a*.8+')';ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,this.size*a*3,0,Math.PI*2);ctx.fillStyle='rgba(61,255,194,'+a*.1+')';ctx.fill()}
  }
}
let particles=[];
function explode(x,y,count){
  count=count||80;
  const flash=document.getElementById('flash');
  flash.style.background='radial-gradient(circle at '+x+'px '+y+'px, rgba(61,255,194,.4) 0%, transparent 60%)';
  flash.style.opacity='1';flash.style.transition='none';
  requestAnimationFrame(function(){flash.style.transition='opacity .8s ease-out';flash.style.opacity='0'});
  for(let i=0;i<count;i++){const angle=Math.random()*Math.PI*2,speed=Math.random()*8+2;particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,Math.random()*60+30,Math.random()*2+.5,'spark'))}
  for(let i=0;i<count/3;i++){const angle=Math.random()*Math.PI*2,speed=Math.random()*4+1;particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,Math.random()*80+40,Math.random()*3+1,'dot'))}
  for(let i=0;i<3;i++){particles.push(new Particle(x,y,0,0,60+i*15,0,'ring'))}
  document.body.style.transform='translate('+(Math.random()-.5)*10+'px,'+(Math.random()-.5)*10+'px)';
  setTimeout(function(){document.body.style.transform=''},100);
}
class FloatingParticle{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.size=Math.random()*1.5+.5;this.alpha=Math.random()*.3+.05;this.pulse=Math.random()*Math.PI*2}
  update(){this.x+=this.vx;this.y+=this.vy;this.pulse+=.02;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset()}
  draw(){const a=this.alpha*(Math.sin(this.pulse)*.5+.5);ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle='rgba(61,255,194,'+a+')';ctx.fill()}
}
const floaters=[];for(let i=0;i<60;i++)floaters.push(new FloatingParticle());
function drawHexGrid(){const s=50,h=s*Math.sqrt(3);ctx.strokeStyle='rgba(61,255,194,.03)';ctx.lineWidth=.5;for(let row=-1;row<H/h+2;row++){for(let col=-1;col<W/(s*1.5)+2;col++){const x=col*s*1.5,y=row*h+(col%2?h/2:0);ctx.beginPath();for(let i=0;i<6;i++){const angle=Math.PI/3*i+Math.PI/6,px=x+s*.4*Math.cos(angle),py=y+s*.4*Math.sin(angle);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.stroke()}}}
let mouse={x:W/2,y:H/2};
document.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;if(Math.random()>.6)particles.push(new Particle(e.clientX,e.clientY,(Math.random()-.5)*2,(Math.random()-.5)*2,30,Math.random()*1.5+.5,'dot'))});
document.addEventListener('click',function(e){explode(e.clientX,e.clientY,100)});
document.addEventListener('touchstart',function(e){for(let i=0;i<e.touches.length;i++)explode(e.touches[i].clientX,e.touches[i].clientY,80)});
function animateEntrance(){
  const mainText=document.getElementById('main-text'),subText=document.getElementById('sub-text'),tagline=document.getElementById('tagline'),title='BY ARMIN';
  setTimeout(function(){explode(W/2,H/2,120);setTimeout(function(){explode(W/2-100,H/2,60)},150);setTimeout(function(){explode(W/2+100,H/2,60)},300)},500);
  setTimeout(function(){subText.style.transition='opacity 1s ease-out';subText.style.opacity='1'},800);
  setTimeout(function(){mainText.style.opacity='1';let html='';for(let i=0;i<title.length;i++){html+='<span style="display:inline-block;opacity:0;transform:translateY(40px) scale(0);animation:letterIn .6s '+(i*.08+.1)+'s forwards cubic-bezier(.17,.67,.21,1.27)">'+(title[i]===' '?'&nbsp;':title[i])+'</span>'}mainText.innerHTML=html;const style=document.createElement('style');style.textContent='@keyframes letterIn{to{opacity:1;transform:translateY(0) scale(1)}}';document.head.appendChild(style);setTimeout(function(){mainText.classList.add('glow')},title.length*80+600)},1400);
  setTimeout(function(){tagline.style.transition='opacity 2s ease-out';tagline.style.opacity='1'},2800);
  setTimeout(function(){explode(W*.2,H*.3,40)},2000);setTimeout(function(){explode(W*.8,H*.7,40)},2500);setTimeout(function(){explode(W*.5,H*.2,30)},3000);
}
let scanY=0;
function loop(){
  ctx.fillStyle='rgba(5,5,8,.15)';ctx.fillRect(0,0,W,H);drawHexGrid();
  traces.forEach(function(t){t.update();t.draw()});floaters.forEach(function(f){f.update();f.draw()});
  particles=particles.filter(function(p){return p.life>0});particles.forEach(function(p){p.update();p.draw()});
  scanY+=1.5;if(scanY>H)scanY=0;ctx.fillStyle='rgba(61,255,194,.015)';ctx.fillRect(0,scanY,W,2);
  const vg=ctx.createRadialGradient(W/2,H/2,W*.2,W/2,H/2,W*.8);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(5,5,8,.6)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  for(let i=0;i<floaters.length;i++){for(let j=i+1;j<floaters.length;j++){const dx=floaters[i].x-floaters[j].x,dy=floaters[i].y-floaters[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){ctx.strokeStyle='rgba(61,255,194,'+(1-dist/120)*.08+')';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(floaters[i].x,floaters[i].y);ctx.lineTo(floaters[j].x,floaters[j].y);ctx.stroke()}}}
  ctx.beginPath();const mg=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,150);mg.addColorStop(0,'rgba(61,255,194,.04)');mg.addColorStop(1,'transparent');ctx.fillStyle=mg;ctx.arc(mouse.x,mouse.y,150,0,Math.PI*2);ctx.fill();
  requestAnimationFrame(loop);
}
loop();animateEntrance();
</script>
</body>
</html>
